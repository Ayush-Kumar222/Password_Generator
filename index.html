<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Password Generator</h1>

    <div class="input-group">
        <label>Password Length:</label>
        <input type="number" id="length" min="4" max="50" value="12" title="Enter the desired password length between 4 and 50 characters">
    </div>

    <div class="options">
        <label><input type="checkbox" id="uppercase" checked> Uppercase</label>
        <label><input type="checkbox" id="lowercase" checked> Lowercase</label>
        <label><input type="checkbox" id="numbers" checked> Numbers</label>
        <label><input type="checkbox" id="symbols"> Special Characters</label>
    </div>

    <button onclick="generatePassword()">Generate Password</button>

    <div class="output">
        <input type="text" id="password" readonly placeholder="Your generated password will appear here">
        <button onclick="copyPassword()">Copy</button>
    </div>

    <p id="error"></p>
</div>

<script src="script.js"></script>
</body>
</html>
